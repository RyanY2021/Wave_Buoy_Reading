[batch]
# UTC time for the first segment start (required)
start = 2026-03-09T18:10:30Z

# Segment schedule controls (required)
window_seconds = 180
step_seconds = 600

# Starting serial number for first segment (e.g., 1 -> 001)
start_serial = 22

# Optional end limit for segment starts (ignored if segment_count is set)
end = 2026-03-09T21:55:00Z

# Optional fixed number of segments. Leave blank to use end/data end.
segment_count = 1

# Paths relative to project root
input_root = input_data
figure_dir = output_data/202603_obs_buoy_400/figure
disp_dir = output_data/202603_obs_buoy_400/disp

# Optional comma-separated buoy folder names.
# Leave blank to use all buoy folders under input_root.
buoy = 202603_obs_buoy_400

# Allowed component values: Upward, Westward, Northward
component = Upward

# Naming prefix for outputs:
#   <series_name>001_<UTC-start>.png/.txt
series_name = obs_buoy_400_
