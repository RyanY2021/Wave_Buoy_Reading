[plot]
# UTC time window (required)
start = 2026-03-09T18:10:30Z
end = 2026-03-09T18:13:30Z

# Paths relative to project root
input_root = input_data
output_dir = output_figures

# Optional comma-separated lists.
# Leave blank to use all buoy folders under input_root.
buoy = 202603_obs_buoy_400

# Allowed values: Upward, Westward, Northward
components = Upward

# Output naming prefix:
#   <series_name>_<UTC-start>.png
series_name = obs_buoy_400
